<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sky Plaza Laundromat | Wash & Fold</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f8fd;
      color: #1e2a38;
      text-align: center;
    }

    .hero {
      background: linear-gradient(rgba(13,59,102,0.75), rgba(13,59,102,0.75)),
                  url("header.jpg");
      background-size: cover;
      background-position: center;
      color: white;
      padding: 80px 20px;
    }

    h1 {
      font-size: 40px;
      margin: 0;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
    }

    .price {
      font-size: 22px;
      margin-top: 15px;
      font-weight: bold;
    }

    .button {
      display: inline-block;
      margin-top: 30px;
      padding: 16px 28px;
      background: #1e90ff;
      color: white;
      text-decoration: none;
      font-size: 18px;
      border-radius: 8px;
      font-weight: bold;
    }

    .section {
      padding: 50px 20px;
    }

    .photos img {
      width: 90%;
      max-width: 600px;
      margin: 20px auto;
      display: block;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    iframe {
      width: 100%;
      max-width: 700px;
      height: 800px;
      border: none;
      border-radius: 10px;
    }

    footer {
      padding: 30px;
      background: #e3e9f2;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>Sky Plaza Laundromat</h1>
  <div>Garrettsville, Ohio</div>
  <div class="price">$1.50 per pound • $25 minimum</div>
  <a href="#order" class="button">Start Wash & Fold Order</a>
</div>

<div class="section">
  <h2>Secure Locker Drop-Off</h2>
  <p>Fill out the form below, drop your laundry in our electronic locker system, and we’ll handle the rest.</p>
</div>

<div class="section photos">
  <h2>Our Facility</h2>
  <img src="photo1.jpg">
  <img src="photo2.jpg">
  <img src="photo3.jpg">
</div>

<div class="section" id="order">
  <h2>Order Form</h2>
  <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdh-b12ZRGDx2HVAUbYEsmUxLibouY4t0JjTSokc7BRieKv0w/viewform?embedded=true"></iframe>
</div>

<footer>
  © 2026 Sky Plaza Laundromat
</footer>

</body>
</html>
